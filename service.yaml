apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: crank-web-admin
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: me-central1-docker.pkg.dev/crank-fit/crank-web-admin/crank-web-admin
          ports:
            - containerPort: 80
          startupProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 6
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            limits:
              memory: "256Mi"
              cpu: "0.5"
