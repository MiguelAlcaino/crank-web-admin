query WebhookEvents($status: String, $cursor: String, $limit: Int) {
  webhookEvents(status: $status, cursor: $cursor, limit: $limit) {
    events {
      id
      eventType
      subscriptionId
      status
      attempts
      lastAttemptAt
      nextRetryAt
      createdAt

      parentEventId
      triggeredBy
      resolvedByEventId
      lastError
      destinationUrl
      payload
    }
    hasMore
    nextCursor
    limit
  }
}
